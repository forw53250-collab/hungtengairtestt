<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>冷氣人格測驗</title>
    
<style>
body{
    font-family:"Microsoft JhengHei",sans-serif;
    background:#f4fff4;
    margin:0;
    padding:20px;
}

/* 開場頁 */
.start-page{
    max-width:700px;
    margin:auto;
    background:white;
    padding:40px;
    border-radius:20px;
    text-align:center;
    box-shadow:0 5px 20px rgba(0,0,0,.1);
}

.start-page input{
    padding:10px;
    width:80%;
    margin-top:10px;
}

.start-page button{
    margin-top:8px;
    padding:10px 20px;
    border:none;
    background:#0088cc;
    color:white;
    border-radius:10px;
    cursor:pointer;
}

/* 題目頁 */
.container{
    max-width:700px;
    margin:auto;
    background:white;
    padding:30px;
    border-radius:20px;
    box-shadow:0 5px 20px rgba(0,0,0,.1);
    display:none;
}

h1{
    text-align:center;
    color:#0088cc;
}

.question{
    display:none;
}

.question.active{
    display:block;
}

label{
    display:block;
    padding:12px;
    margin:10px 0;
    background:#f2f2f2;
    border-radius:10px;
    cursor:pointer;
}

/* 結果區塊 */
#result{
    display:none;
    padding:20px;
    background:#f7f7f7;
    border-radius:15px;
    text-align:center;
}

/* ⭐ 重點：電腦螢幕自適應圖片 */
.result-photo{
    width:100%;
    -width:420px;      /* 電腦最大不要超過420px */
    -height:70vh;      /* 不超過螢幕高度70% */
    height:auto;
    display:block;
    margin:20px auto;
    border-radius:15px;
    object-fit:contain;
}
.start-page{
    -width:700px;
    margin:auto;
    background:white;
    padding:20px;
    border-radius:20px;
    text-align:center;
    box-shadow:0 5px 20px rgba(0,0,0,.1);
    position:relative;
}

.start-image{
    width:100%;
    display:block;
    border-radius:20px;
}

.start-btn{
    position:absolute;
    left:50%;
    top:82%;
    transform:translate(-50%,-50%);

    padding:15px 40px;
    font-size:22px;
    border:none;
    border-radius:50px;

    background:#ff7b00;
    color:white;
    cursor:pointer;

    box-shadow:0 5px 15px rgba(0,0,0,.2);
}

.start-btn:hover{
    background:#ff9500;
}

/* ✅ 新增：狀態提示 */
.status-message {
    margin-top: 20px;
    padding: 10px;
    border-radius: 5px;
    text-align: center;
    display: none;
    font-weight: bold;
}

.status-message.success {
    background: #d4edda;
    color: #155724;
    border: 1px solid #c3e6cb;
    display: block;
}

.status-message.error {
    background: #f8d7da;
    color: #721c24;
    border: 1px solid #f5c6cb;
    display: block;
}
    .privacy-note{
    margin-top: 5px;
    font-size: 11px;
    color: #aaa;
    text-align: center;
}
</style>
</head>

<body>

<!-- 開場頁 -->
<div id="startPage" class="start-page">

    <img src="images/start5.png" class="start-image">

    <button class="start-btn" onclick="startQuiz()">
        開始測驗
    </button>

    <div class="privacy-note">
        為提供測驗結果，本系統將記錄本次測驗資料。
    </div>

</div>
    

<!-- 題目 -->
<div class="container">

<h1>❄️ 《生活人格測驗｜測出你最適合的冷氣品牌》</h1>

<div class="question active" id="q1">
<h3>Q1. 面對挑戰或突發狀況時，你通常會怎麼應對？</h3>
<label onclick="next('A')">A. 以能最快解決問題為優先考量</label>
<label onclick="next('B')">B. 尋求專業建議，從根本理解並解決問題</label>
<label onclick="next('C')">C. 會同時考慮長期影響與未來規劃</label>
<label onclick="next('D')">D. 會參考過去經驗後再做判斷</label>
<label onclick="next('E')">E. 保持彈性，依情況靈活應對</label>
</div>

<div class="question" id="q2">
<h3>Q2. 在工作環境中，你比較傾向與哪種類型的人共事？</h3>
<label onclick="next('A')">A. 節奏明快、溝通直接的人</label>
<label onclick="next('B')">B. 做事扎實、重視基礎與流程的人</label>
<label onclick="next('C')">C. 低調穩定、值得信賴的人</label>
<label onclick="next('D')">D. 對專業領域充滿好奇與熱情的人</label>
<label onclick="next('E')">E. 隨和開放、適應力強的人</label>
</div>

<div class="question" id="q3">
<h3>Q3. 朋友通常會怎麼形容你？</h3>
<label onclick="next('A')">A. 思考周全、做事有全局觀</label>
<label onclick="next('B')">B. 喜歡探究原因、講求理解本質</label>
<label onclick="next('C')">C. 有原則、界線清楚則</label>
<label onclick="next('D')">D. 勇於探索嘗試新事物</label>
<label onclick="next('E')">E. 親和隨和、好相處</label>
</div>

<div class="question" id="q4">
<h3>Q4. 說到理想的夢幻車款，你會更偏向哪一種選擇？</h3>
<label onclick="next('A')">A. 配備完整且實用性高的選擇</label>
<label onclick="next('B')">B. 重視品牌技術與專業實力</label>
<label onclick="next('C')">C. 注重耐用性與長期穩定性</label>
<label onclick="next('D')">D. 強調操控感與整體工藝體驗</label>
<label onclick="next('E')">E. 依直覺與外觀感受做決定</label>
</div>

<div class="question" id="q5">
<h3>Q5. 下班回家感到疲累時，你通常會怎麼放鬆?</h3>
<label onclick="next('A')">A. 先整理好待辦事項，安排妥當後才安心休息</label>
<label onclick="next('B')">B. 滑滑手機稍微了解今天的社會動態</label>
<label onclick="next('C')">C. 暫時隔絕外界訊息與干擾</label>
<label onclick="next('D')">D. 透過音樂、影片營造舒適的環境氛圍</label>
<label onclick="next('E')">E. 不特別安排休息方式，自然放鬆</label>
</div>

<div class="question" id="q6">
<h3>Q6. 你最認同以下哪一種生活態度？</h3>
<label onclick="next('A')">A. 把資源用在最有效益的地方</label>
<label onclick="next('B')">B. 專業的事交給專業</label>
<label onclick="next('C')">C. 品質決定一切長期價值</label>
<label onclick="next('D')">D. 細節成就完美</label>
<label onclick="next('E')">E. 歡喜就好</label>
</div>

<div id="result"></div>
<div id="statusMessage" class="status-message"></div>

</div>

<script>
let answers = [];
let scores = {A:0,B:0,C:0,D:0,E:0};
let current = 1;

const photos = {
    A:"images/心理測驗插圖2-01.png",
    B:"images/心理測驗插圖2-02.png",
    C:"images/心理測驗插圖2-03.png",
    D:"images/心理測驗插圖2-04.png",
    E:"images/心理測驗插圖2-05.png"
};

function startQuiz(){
    document.getElementById("startPage").style.display = "none";
    document.querySelector(".container").style.display = "block";
}

function next(val){
    answers.push(val); 
    scores[val]++;

    document.getElementById("q"+current).classList.remove("active");
    current++;

    if(current > 6){
        showResult();
    }else{
        document.getElementById("q"+current).classList.add("active");
    }
}

function showResult(){
    document.querySelectorAll(".question").forEach(q=>{
        q.style.display = "none";
    });
let max = Math.max(...Object.values(scores));

// 找出所有最高分
let topTypes = Object.keys(scores).filter(
    key => scores[key] === max
);

// ✔ 核心規則：只要平手 → E
let winner;

if (topTypes.length === 1) {
    winner = topTypes[0]; // 唯一最高才成立
} else {
    winner = "E"; // 只要有平手（含2個以上）→ E
}

    document.getElementById("result").style.display = "block";
    document.getElementById("result").innerHTML =
    `<img src="${photos[winner]}" class="result-photo">`;

    // ✅ 準備資料
    const payload = {
        time: new Date().toISOString(),
        Q1: answers[0],
        Q2: answers[1],
        Q3: answers[2],
        Q4: answers[3],
        Q5: answers[4],
        Q6: answers[5],
        A: scores.A,
        B: scores.B,
        C: scores.C,
        D: scores.D,
        E: scores.E,
        result: winner
    };

    console.log('🔄 開始傳送資料...', payload);

    // ✅ 使用 mode: 'no-cors' 解決 Chrome CORS 問題
    fetch("https://script.google.com/macros/s/AKfycbzBtKx0UT3VdirnhUvKcIymPqWzxPZvT10UoQ_h-9VhrZ3j8eIOrcoxCjol5JdXl3gx/exec", {
        method: "POST",
        mode: 'no-cors',
        headers: {
            'Content-Type': 'application/json'
        },
        body: JSON.stringify(payload)
    })
    .then(response => {
        console.log('✅ 請求已成功發送到後台');
        showStatus('✅ 感謝您完成測驗，長按儲存結果！', 'success');
    })
    .catch(error => {
        console.error('❌ 發送失敗:', error);
        showStatus('✅ 感謝你完成測驗，長按儲存結果！', 'success');
    });
}

function showStatus(message, type) {
    const statusEl = document.getElementById('statusMessage');
    statusEl.textContent = message;
    statusEl.className = 'status-message ' + type;
}
</script>

</body>
</html>
